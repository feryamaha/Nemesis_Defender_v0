[project]
name = "nemesis-framework"
framework = "Nemesis v2.0"

[features]
codex_hooks = true

[hooks]
managed_dir = ".nemesis/bin"

[[hooks.PreToolUse]]
matcher = "Bash|apply_patch|Edit|Write|mcp__.*"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "{{NEMESIS_HOOK_PATH}}"
timeout = 30
statusMessage = "Nemesis pre-tool enforcement"

[[hooks.PermissionRequest]]
matcher = "Bash|apply_patch|Edit|Write|mcp__.*"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "{{NEMESIS_HOOK_PATH}}"
timeout = 30
statusMessage = "Nemesis permission enforcement"

[[hooks.PostToolUse]]
matcher = "Bash|apply_patch|Edit|Write|mcp__.*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "{{NEMESIS_HOOK_PATH}}"
timeout = 30
statusMessage = "Nemesis post-tool review"