    "gpg", "gpg2",
    "ssh-keygen", "ssh-add", "ssh-agent",
    "keychain", "secret-tool", "pass",
    "gnome-keyring-daemon", "security",

    # === MOVIMENTAÇÃO E CÓPIA DESTRUTIVA ===
    "mv", "cp", "install",

    # === COMPRESSÃO / EMPACOTAMENTO (exfil de dados) ===
    "gzip", "gunzip", "bzip2", "xz", "zstd",
    "7z", "rar", "cpio",

    # === AGENDAMENTO E PERSISTÊNCIA ===
    "cron", "crontab", "at", "atd",
    "systemctl", "service", "launchctl",

    # === MODIFICAÇÃO DE REDE ===
    "iptables", "ip6tables", "nft",
    "ip", "ifconfig", "iwconfig", "tc",

