<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="O cgroup do agente delimita o enforcement só ao agente; dele saem o bloqueio de exec e o controle de egress; a allowlist de egress decide por destino CIDR:porta e nega por padrão, bloqueando exfiltração e C2; o Landlock faz tudo rodar sem root.">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#56708f"/></marker>
    <marker id="arr3Ok" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#5fd38a"/></marker>
    <marker id="arr3Bad" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#ff6b6b"/></marker>
  </defs>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif}
    .t{fill:#e8edf6;font-size:15px;font-weight:600}
    .s{fill:#8595ab;font-size:12px}
    .m{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace}
    .edge{stroke:#56708f;stroke-width:1.6;fill:none}
  </style>

  <!-- Landlock -->
  <rect x="30" y="46" width="240" height="84" rx="8" fill="#0c1019" stroke="#21a99e" stroke-dasharray="4 3"/>
  <text x="150" y="78" text-anchor="middle" class="t" fill="#b8c4d6" font-size="13">Landlock</text>
  <text x="150" y="100" text-anchor="middle" class="s" fill="#b8c4d6">roda sem root:</text>
  <text x="150" y="118" text-anchor="middle" class="s" fill="#b8c4d6">privilégio mínimo</text>
  <path d="M270 88 H336" fill="none" stroke="#21a99e" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- cgroup -->
  <rect x="340" y="36" width="330" height="104" rx="10" fill="#121826" stroke="#38e1d3"/>
  <text x="505" y="70" text-anchor="middle" class="t">cgroup do agente</text>
  <text x="505" y="94" text-anchor="middle" class="s">delimita o enforcement só ao agente:</text>
  <text x="505" y="112" text-anchor="middle" class="s">IDE, terminal e sistema ficam de fora</text>

  <!-- ramos -->
  <path class="edge" d="M440 140 C400 168 330 180 296 188" marker-end="url(#arr3)"/>
  <path class="edge" d="M570 140 C610 168 670 180 700 188" marker-end="url(#arr3)"/>

  <!-- exec -->
  <rect x="150" y="192" width="280" height="76" rx="10" fill="#121826" stroke="#38e1d3"/>
  <text x="290" y="224" text-anchor="middle" class="t">bloqueio de exec</text>
  <text x="290" y="248" text-anchor="middle" class="s">só para processos do agente</text>

  <!-- egress -->
  <rect x="560" y="192" width="280" height="76" rx="10" fill="#121826" stroke="#38e1d3"/>
  <text x="700" y="224" text-anchor="middle" class="t">controle de egress</text>
  <text x="700" y="248" text-anchor="middle" class="s">toda conexão de saída do agente</text>

  <path class="edge" d="M700 268 V308" marker-end="url(#arr3)"/>

  <!-- decisão allowlist -->
  <polygon points="700,310 830,372 700,434 570,372" fill="#121826" stroke="#38e1d3"/>
  <text x="700" y="366" text-anchor="middle" class="t">destino na allowlist?</text>
  <text x="700" y="390" text-anchor="middle" class="s m" fill="#38e1d3">CIDR:porta</text>

  <!-- sim → permite -->
  <path class="edge" d="M596 410 C520 458 460 476 416 482" stroke="#5fd38a" marker-end="url(#arr3Ok)"/>
  <text x="500" y="452" text-anchor="middle" class="s m" fill="#5fd38a">sim</text>
  <rect x="160" y="456" width="250" height="64" rx="10" fill="#0e2a1a" stroke="#5fd38a"/>
  <text x="285" y="483" text-anchor="middle" class="t" fill="#d7ffe6">conexão permitida</text>
  <text x="285" y="505" text-anchor="middle" class="s" fill="#9fd8b4">destino aprovado por humano</text>

  <!-- não → nega -->
  <path class="edge" d="M760 428 C790 452 800 460 810 464" stroke="#ff6b6b" marker-end="url(#arr3Bad)"/>
  <text x="812" y="446" text-anchor="middle" class="s m" fill="#ff6b6b">não</text>
  <rect x="670" y="466" width="290" height="76" rx="10" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="815" y="498" text-anchor="middle" class="t m" fill="#ffd7d7">-EPERM</text>
  <text x="815" y="522" text-anchor="middle" class="s" fill="#e8a0a0">nega por padrão: bloqueia exfiltração e C2</text>

  <!-- nota -->
  <rect x="30" y="310" width="250" height="96" rx="8" fill="#0c1019" stroke="#21a99e" stroke-dasharray="4 3"/>
  <text x="155" y="342" text-anchor="middle" class="s" fill="#b8c4d6">Allowlist própria e separada</text>
  <text x="155" y="360" text-anchor="middle" class="s m" fill="#b8c4d6">allowlist-ebpf.toml</text>
  <text x="155" y="384" text-anchor="middle" class="s" fill="#b8c4d6">editável só por humano</text>
</svg>
