<svg viewBox="0 0 980 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The threat model declares scope and limits (residual risk: trusting-trust); CI becomes a gate with self-audit, SLSA provenance plus reviewer on release, and CODEOWNERS; the doctor provides observability and the red-team proves the engine still detects.">
  <defs>
    <marker id="arr10" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#56708f"/></marker>
    <marker id="arr10Ok" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#5fd38a"/></marker>
  </defs>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif}
    .t{fill:#e8edf6;font-size:14px;font-weight:600}
    .s{fill:#8595ab;font-size:12px}
    .m{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace}
    .edge{stroke:#56708f;stroke-width:1.6;fill:none}
  </style>

  <!-- threat model -->
  <rect x="310" y="24" width="360" height="90" rx="10" fill="#1e1830" stroke="#b794f6"/>
  <text x="490" y="54" text-anchor="middle" class="t" fill="#efe6ff">THREAT MODEL</text>
  <text x="490" y="76" text-anchor="middle" class="s" fill="#b9a8dc">declares scope and limits openly</text>
  <text x="490" y="94" text-anchor="middle" class="s" fill="#b9a8dc">residual risk: trusting-trust</text>

  <path class="edge" d="M490 114 V146" marker-end="url(#arr10)"/>

  <!-- gate CI -->
  <rect x="40" y="150" width="900" height="180" rx="12" fill="#0c1019" stroke="#243043"/>
  <text x="60" y="178" class="s m" fill="#38e1d3" font-weight="700" letter-spacing=".12em">CI AS GATE (DEVSECOPS)</text>

  <rect x="65" y="200" width="270" height="106" rx="10" fill="#121826" stroke="#38e1d3"/>
  <text x="200" y="230" text-anchor="middle" class="t">self-audit</text>
  <text x="200" y="254" text-anchor="middle" class="s">pentest against its own engine</text>
  <text x="200" y="272" text-anchor="middle" class="s m" fill="#38e1d3">cargo audit + lockfile</text>
  <text x="200" y="292" text-anchor="middle" class="s">on every change</text>

  <rect x="355" y="200" width="270" height="106" rx="10" fill="#121826" stroke="#38e1d3"/>
  <text x="490" y="230" text-anchor="middle" class="t">release</text>
  <text x="490" y="254" text-anchor="middle" class="s">SLSA provenance proof</text>
  <text x="490" y="272" text-anchor="middle" class="s">+ mandatory human reviewer</text>
  <text x="490" y="292" text-anchor="middle" class="s">nothing ships without both</text>

  <rect x="645" y="200" width="270" height="106" rx="10" fill="#121826" stroke="#38e1d3"/>
  <text x="780" y="230" text-anchor="middle" class="t">CODEOWNERS</text>
  <text x="780" y="254" text-anchor="middle" class="s">mandatory human review</text>
  <text x="780" y="272" text-anchor="middle" class="s">on security-critical paths</text>
  <text x="780" y="292" text-anchor="middle" class="s">(rules, hooks, engine)</text>

  <path class="edge" d="M490 330 V362" marker-end="url(#arr10)"/>

  <!-- doctor -->
  <rect x="310" y="366" width="360" height="84" rx="10" fill="#0d1f1d" stroke="#38e1d3" stroke-width="1.6"/>
  <text x="490" y="396" text-anchor="middle" class="t m" fill="#38e1d3">nemesis-doctor</text>
  <text x="490" y="418" text-anchor="middle" class="s">observability per layer: G1 to G7</text>
  <text x="490" y="436" text-anchor="middle" class="s">verdict HEALTHY · WARNING · CRITICAL</text>

  <path class="edge" d="M490 450 V482" stroke="#5fd38a" marker-end="url(#arr10Ok)"/>

  <!-- red-team -->
  <rect x="310" y="486" width="360" height="84" rx="10" fill="#0e2a1a" stroke="#5fd38a" stroke-width="1.6"/>
  <text x="490" y="516" text-anchor="middle" class="t" fill="#d7ffe6">red-team</text>
  <text x="490" y="538" text-anchor="middle" class="s" fill="#9fd8b4">empirical proof: the pentest suite against the real engine</text>
  <text x="490" y="556" text-anchor="middle" class="s" fill="#9fd8b4">(the script auto-detects the cases): evidence, not promise</text>

  <!-- nota lateral -->
  <rect x="40" y="380" width="230" height="120" rx="8" fill="#0c1019" stroke="#21a99e" stroke-dasharray="4 3"/>
  <text x="155" y="410" text-anchor="middle" class="s" fill="#b8c4d6">Scope honesty:</text>
  <text x="155" y="432" text-anchor="middle" class="s" fill="#b8c4d6">what is not covered is</text>
  <text x="155" y="450" text-anchor="middle" class="s" fill="#b8c4d6">declared, not hidden.</text>
  <text x="155" y="478" text-anchor="middle" class="s" fill="#b8c4d6">Security without proof is faith.</text>
  <path d="M270 420 C290 416 296 410 306 406" fill="none" stroke="#21a99e" stroke-width="1.2" stroke-dasharray="4 3"/>
</svg>
