<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Classes de ataque reconhecidas (cadeia de execução ofuscada, callback remoto, ofuscação Unicode, hook de build, gatilho dormente) e o princípio da coexistência: nenhum sinal isolado é conclusivo, mas a combinação inequívoca é: como credencial mais egress.">
  <defs>
    <marker id="arr8" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#56708f"/></marker>
    <marker id="arr8Qz" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#f5b54a"/></marker>
  </defs>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif}
    .t{fill:#e8edf6;font-size:14px;font-weight:600}
    .s{fill:#8595ab;font-size:12px}
    .m{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace}
    .edge{stroke:#56708f;stroke-width:1.6;fill:none}
  </style>

  <!-- painel de classes -->
  <rect x="30" y="30" width="430" height="460" rx="12" fill="#0c1019" stroke="#243043"/>
  <text x="50" y="60" class="s m" fill="#ff6b6b" font-weight="700" letter-spacing=".12em">CLASSES DE ATAQUE RECONHECIDAS</text>

  <rect x="50" y="80" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="106" text-anchor="middle" class="t" fill="#ffd7d7">cadeia de execução ofuscada</text>
  <text x="245" y="128" text-anchor="middle" class="s m" fill="#e8a0a0">decode → exec (base64, hex, aninhado)</text>

  <rect x="50" y="158" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="184" text-anchor="middle" class="t" fill="#ffd7d7">canal de callback remoto</text>
  <text x="245" y="206" text-anchor="middle" class="s" fill="#e8a0a0">reverse shell, C2 esperando ordens</text>

  <rect x="50" y="236" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="262" text-anchor="middle" class="t" fill="#ffd7d7">ofuscação Unicode</text>
  <text x="245" y="284" text-anchor="middle" class="s" fill="#e8a0a0">homoglifos, bidi (CVE-2021-42574)</text>

  <rect x="50" y="314" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="340" text-anchor="middle" class="t" fill="#ffd7d7">hook de build / instalação</text>
  <text x="245" y="362" text-anchor="middle" class="s m" fill="#e8a0a0">postinstall roda sem ninguém pedir</text>

  <rect x="50" y="392" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="418" text-anchor="middle" class="t" fill="#ffd7d7">gatilho dormente</text>
  <text x="245" y="440" text-anchor="middle" class="s" fill="#e8a0a0">time-gated: fica quieto até a data-alvo</text>

  <!-- princípio -->
  <path class="edge" d="M460 260 H526" marker-end="url(#arr8)"/>
  <rect x="530" y="170" width="420" height="180" rx="10" fill="#0d1f1d" stroke="#38e1d3" stroke-width="1.6"/>
  <text x="740" y="204" text-anchor="middle" class="t" fill="#38e1d3">PRINCÍPIO DA COEXISTÊNCIA</text>
  <text x="740" y="234" text-anchor="middle" class="s" fill="#b8c4d6">nenhum sinal heurístico isolado é conclusivo;</text>
  <text x="740" y="254" text-anchor="middle" class="s" fill="#b8c4d6">a combinação inequívoca de sinais independentes é.</text>
  <text x="740" y="286" text-anchor="middle" class="s" fill="#8595ab">É o que separa código legítimo (um sinal, contexto</text>
  <text x="740" y="304" text-anchor="middle" class="s" fill="#8595ab">normal) de malware (sinais que só coexistem em ataque).</text>

  <!-- exemplo -->
  <path class="edge" d="M740 350 V386" stroke="#f5b54a" marker-end="url(#arr8Qz)"/>
  <rect x="545" y="390" width="390" height="80" rx="10" fill="#2a2410" stroke="#f5b54a"/>
  <text x="740" y="420" text-anchor="middle" class="t" fill="#ffeccb">exemplo canônico</text>
  <text x="740" y="444" text-anchor="middle" class="s m" fill="#d9c08a">ler credencial (.env) + egress p/ fora</text>
  <text x="740" y="462" text-anchor="middle" class="s" fill="#d9c08a">= cadeia de exfiltração → bloqueia</text>
</svg>
