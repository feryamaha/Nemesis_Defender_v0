<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recognized attack classes (obfuscated execution chain, remote callback, Unicode obfuscation, build hook, dormant trigger) and the coexistence principle: no isolated signal is conclusive, but an unambiguous combination is, such as credential plus egress.">
  <defs>
    <marker id="arr8" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#56708f"/></marker>
    <marker id="arr8Qz" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#f5b54a"/></marker>
  </defs>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif}
    .t{fill:#e8edf6;font-size:14px;font-weight:600}
    .s{fill:#8595ab;font-size:12px}
    .m{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace}
    .edge{stroke:#56708f;stroke-width:1.6;fill:none}
  </style>

  <!-- painel de classes -->
  <rect x="30" y="30" width="430" height="460" rx="12" fill="#0c1019" stroke="#243043"/>
  <text x="50" y="60" class="s m" fill="#ff6b6b" font-weight="700" letter-spacing=".12em">RECOGNIZED ATTACK CLASSES</text>

  <rect x="50" y="80" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="106" text-anchor="middle" class="t" fill="#ffd7d7">obfuscated execution chain</text>
  <text x="245" y="128" text-anchor="middle" class="s m" fill="#e8a0a0">decode → exec (base64, hex, nested)</text>

  <rect x="50" y="158" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="184" text-anchor="middle" class="t" fill="#ffd7d7">remote callback channel</text>
  <text x="245" y="206" text-anchor="middle" class="s" fill="#e8a0a0">reverse shell, C2 awaiting orders</text>

  <rect x="50" y="236" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="262" text-anchor="middle" class="t" fill="#ffd7d7">Unicode obfuscation</text>
  <text x="245" y="284" text-anchor="middle" class="s" fill="#e8a0a0">homoglyphs, bidi (CVE-2021-42574)</text>

  <rect x="50" y="314" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="340" text-anchor="middle" class="t" fill="#ffd7d7">build / install hook</text>
  <text x="245" y="362" text-anchor="middle" class="s m" fill="#e8a0a0">postinstall runs unasked</text>

  <rect x="50" y="392" width="390" height="66" rx="8" fill="#2a1014" stroke="#ff6b6b"/>
  <text x="245" y="418" text-anchor="middle" class="t" fill="#ffd7d7">dormant trigger</text>
  <text x="245" y="440" text-anchor="middle" class="s" fill="#e8a0a0">time-gated: stays quiet until the target date</text>

  <!-- princípio -->
  <path class="edge" d="M460 260 H526" marker-end="url(#arr8)"/>
  <rect x="530" y="170" width="420" height="180" rx="10" fill="#0d1f1d" stroke="#38e1d3" stroke-width="1.6"/>
  <text x="740" y="204" text-anchor="middle" class="t" fill="#38e1d3">COEXISTENCE PRINCIPLE</text>
  <text x="740" y="234" text-anchor="middle" class="s" fill="#b8c4d6">no isolated heuristic signal is conclusive;</text>
  <text x="740" y="254" text-anchor="middle" class="s" fill="#b8c4d6">an unambiguous combination of independent signals is.</text>
  <text x="740" y="286" text-anchor="middle" class="s" fill="#8595ab">It is what separates legitimate code (one signal, normal</text>
  <text x="740" y="304" text-anchor="middle" class="s" fill="#8595ab">context) from malware (signals that only coexist in attack).</text>

  <!-- exemplo -->
  <path class="edge" d="M740 350 V386" stroke="#f5b54a" marker-end="url(#arr8Qz)"/>
  <rect x="545" y="390" width="390" height="80" rx="10" fill="#2a2410" stroke="#f5b54a"/>
  <text x="740" y="420" text-anchor="middle" class="t" fill="#ffeccb">canonical example</text>
  <text x="740" y="444" text-anchor="middle" class="s m" fill="#d9c08a">read credential (.env) + outbound egress</text>
  <text x="740" y="462" text-anchor="middle" class="s" fill="#d9c08a">= exfiltration chain → blocks</text>
</svg>
